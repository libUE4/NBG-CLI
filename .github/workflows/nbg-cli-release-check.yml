name: nbg-cli-release-check

on:
  push:
    branches:
      - main
    paths:
      - "sdk/**"
      - "AGENTS.md"
      - "docs-internal/commercialization-plan.md"
      - ".github/workflows/nbg-cli-release-check.yml"
  pull_request:
    branches:
      - main
    paths:
      - "sdk/**"
      - "AGENTS.md"
      - "docs-internal/commercialization-plan.md"
      - ".github/workflows/nbg-cli-release-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli-release-check:
    name: NBG CLI release gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Install SDK workspace dependencies
        run: bun install
        working-directory: sdk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run NBG CLI release gate
        run: bun run check:release
        working-directory: sdk/apps/cli
